<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="50%" stop-color="#0d1825"/>
      <stop offset="100%" stop-color="#07111A"/>
    </linearGradient>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="16" height="16" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="16" stroke="#2DC6DF" stroke-width="1" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect x="160" y="90" width="1280" height="720" fill="url(#hatch)" stroke="#2DC6DF" stroke-width="2" stroke-dasharray="6 6" opacity="0.7"/>
  <text x="800" y="450" text-anchor="middle" fill="#9DB4C0" font-family="-apple-system, sans-serif" font-size="22" letter-spacing="2">[ family photo: carrying Liv over the bump ]</text>
  <text x="800" y="490" text-anchor="middle" fill="#5A6A78" font-family="-apple-system, sans-serif" font-size="14">replace with assets/liv-photo.jpg</text>
</svg>
